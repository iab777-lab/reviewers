<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HK Family Trip 2026</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #f2f4f8;
}

header {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  padding: 20px;
  text-align: center;
}

nav {
  display: flex;
  overflow-x: auto;
  background: white;
}

nav button {
  flex: none;
  padding: 12px;
  border: none;
  background: none;
}

nav button.active {
  border-bottom: 3px solid #667eea;
  font-weight: bold;
}

.container {
  padding: 16px;
}

.card {
  background: white;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
}

.time {
  font-weight: bold;
  color: #667eea;
}

.btn {
  display: inline-block;
  margin-top: 8px;
  padding: 8px 10px;
  border-radius: 8px;
  background: #667eea;
  color: white;
  text-decoration: none;
  font-size: 12px;
}

.tip {
  background: #fff4cc;
  padding: 10px;
  border-radius: 10px;
  margin-top: 8px;
}

.budget {
  background: #e6fffa;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 12px;
}
</style>
</head>

<body>

<header>
  <h2>🇭🇰 Hong Kong Family Trip</h2>
  <p>Smart Travel Planner</p>
</header>

<nav id="tabs"></nav>
<div class="container" id="content"></div>

<script>

const days = [

{
title: "Day 1 – Arrival",
items: [
{
text: "Arrive at Hong Kong International Airport",
map: "https://maps.google.com/?q=Hong+Kong+International+Airport"
},
{
text: "Taxi to Disney Explorers Lodge",
map: "https://maps.google.com/?q=Disney+Explorers+Lodge"
},
{
text: "Explore hotel + dinner",
tip: "Buy snacks at airport to save money"
}
]
},

{
title: "Day 2 – Disneyland",
items: [
{
text: "Morning: Frozen + Mystic Manor",
tip: "Do Frozen FIRST (longest lines)"
},
{
text: "Afternoon: shows + rest"
},
{
text: "Night: Momentous show"
}
]
},

{
title: "Day 3 – Disney + Transfer",
items: [
{
text: "Morning rides + photos"
},
{
text: "4:00 PM – Leave park"
},
{
text: "Taxi to BP International",
map: "https://maps.google.com/?q=BP+International+Hotel+Hong+Kong"
}
]
},

{
title: "Day 4 – Peak + Harbour",
items: [
{
text: "Victoria Peak",
map: "https://maps.google.com/?q=Victoria+Peak+Hong+Kong"
},
{
text: "Lunch: Yat Lok Roast Goose",
map: "https://maps.google.com/?q=Yat+Lok+Roast+Goose"
},
{
text: "Star Ferry",
map: "https://maps.google.com/?q=Star+Ferry+Hong+Kong"
},
{
text: "K11 Musea (REST)",
map: "https://maps.google.com/?q=K11+Musea"
},
{
text: "Symphony of Lights",
map: "https://maps.google.com/?q=Avenue+of+Stars+Hong+Kong"
}
]
},

{
title: "Day 5 – Ngong Ping + Tai O",
items: [
{
text: "Go straight to Big Buddha (no stopping!)",
map: "https://maps.google.com/?q=Tian+Tan+Buddha"
},
{
text: "Climb in stages (rest every 100 steps)",
tip: "Say: 'next stop!' instead of 'top' for kids 😄"
},
{
text: "Po Lin Monastery rest",
map: "https://maps.google.com/?q=Po+Lin+Monastery"
},
{
text: "Ice cream + snacks at village"
},
{
text: "Bus to Tai O",
map: "https://maps.google.com/?q=Tai+O+Fishing+Village"
}
]
},

{
title: "Day 6 – Food + Night Market",
items: [
{
text: "Science Museum",
map: "https://maps.google.com/?q=Hong+Kong+Science+Museum"
},
{
text: "Dim sum lunch",
tip: "Try Tim Ho Wan or DimDimSum"
},
{
text: "Temple Street Night Market",
map: "https://maps.google.com/?q=Temple+Street+Night+Market"
}
]
},

{
title: "Day 7 – Departure",
items: [
{
text: "Breakfast: Australian Dairy Company",
map: "https://maps.google.com/?q=Australian+Dairy+Company"
},
{
text: "Go to airport"
}
]
}

];

function renderTabs() {
  const tabs = document.getElementById("tabs");
  days.forEach((d, i) => {
    const btn = document.createElement("button");
    btn.innerText = "Day " + (i+1);
    btn.onclick = () => showDay(i);
    if(i===0) btn.classList.add("active");
    tabs.appendChild(btn);
  });
}

function showDay(index) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
  document.querySelectorAll("nav button")[index].classList.add("active");

  const container = document.getElementById("content");
  container.innerHTML = "";

  const budget = document.createElement("div");
  budget.className = "budget";
  budget.innerText = "💰 Daily Budget Est: HKD 1,500–2,500 (family)";
  container.appendChild(budget);

  days[index].items.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = item.text;

    if(item.map){
      const link = document.createElement("a");
      link.href = item.map;
      link.target = "_blank";
      link.className = "btn";
      link.innerText = "Open Map";
      card.appendChild(link);
    }

    if(item.tip){
      const tip = document.createElement("div");
      tip.className = "tip";
      tip.innerText = item.tip;
      card.appendChild(tip);
    }

    container.appendChild(card);
  });
}

renderTabs();
showDay(0);

</script>

</body>
</html>
